<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
canvas { border: 1px solid #333; }
</style>
</head>
<body>
<canvas id="test" width="600" height="600"></canvas>
<script>
const canvas = document.getElementById('test');
const ctx = canvas.getContext('2d');
const size = 15;
const cellSize = 40;
const padding = cellSize/2; // 20

// Test grid lines
ctx.strokeStyle = '#333';
ctx.lineWidth = 1;
for (let i = 0; i < size; i++) {
    const pos = i * cellSize + cellSize/2;
    ctx.beginPath();
    ctx.moveTo(padding, pos);
    ctx.lineTo(600 - padding, pos);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos, padding);
    ctx.lineTo(pos, 600 - padding);
    ctx.stroke();
}

// Test star points
const stars = [[3,3], [11,3], [3,11], [11,11], [7,7]];
ctx.fillStyle = '#c00';
stars.forEach(([r,c]) => {
    const x = c * cellSize + cellSize/2;
    const y = r * cellSize + cellSize/2;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fill();
});

// Test piece at (7,7)
const x7 = 7 * cellSize + cellSize/2;
const y7 = 7 * cellSize + cellSize/2;
ctx.beginPath();
ctx.arc(x7, y7, 17, 0, Math.PI*2);
ctx.fillStyle = '#000';
ctx.fill();
</script>
</body>
</html>
